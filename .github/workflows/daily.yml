# ファイル配置先: .github/workflows/daily.yml
name: Morning News Podcast

on:
  schedule:
    # 毎朝6時（日本時間）= UTC 21:00（前日）
    - cron: '0 21 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: ニュース生成スクリプト実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python morning_news.py

      - name: 古いファイルを削除（7日以上前）
        run: |
          find docs/ -name "*.mp3" -mtime +7 -delete 2>/dev/null || true
          find docs/ -name "*.txt" -mtime +7 -delete 2>/dev/null || true

      - name: 生成ファイルをコミット＆プッシュ
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -f docs/
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "🎙️ $(date +%Y-%m-%d) モーニングニュース更新"
          git push
